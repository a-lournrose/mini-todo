@if (label()) {
  <div class="label">{{ label() }}</div>
}
<div class="input-wrapper">
  <input [class]="inputClass()" [type]="currentType()" [formControl]="control()"/>

  @if(isPasswordType()) {
    <button class="toggle-password" (click)="togglePasswordVisibility()">
      <svg [lucideIcon]="toggleIcon()" [size]="20"/>
    </button>
  }
</div>
